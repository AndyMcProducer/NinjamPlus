name: CI Diagnostics

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  diagnostics:
    name: Diagnostics on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Collect environment (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -eux
          echo "RUNNER_OS=${RUNNER_OS}" > diag.txt
          echo "GITHUB_RUN_ID=${GITHUB_RUN_ID}" >> diag.txt
          echo "USER=$(whoami 2>/dev/null || true)" >> diag.txt
          echo "PWD=${PWD}" >> diag.txt
          echo "=== cmake --version ===" >> diag.txt
          cmake --version >> diag.txt 2>&1 || true
          echo "=== which cmake ===" >> diag.txt
          which cmake >> diag.txt 2>&1 || true
          echo "=== uname -a ===" >> diag.txt
          uname -a >> diag.txt 2>&1 || true
          echo "=== ls -la (repo root) ===" >> diag.txt
          ls -la >> diag.txt 2>&1 || true
          echo "=== tar --version ===" >> diag.txt
          tar --version >> diag.txt 2>&1 || true

      - name: Collect environment (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "RUNNER_OS=$env:RUNNER_OS" | Out-File -FilePath diag.txt -Encoding utf8
          "GITHUB_RUN_ID=$env:GITHUB_RUN_ID" | Out-File -FilePath diag.txt -Append -Encoding utf8
          "USERNAME=$env:USERNAME" | Out-File -FilePath diag.txt -Append -Encoding utf8
          "=== cmake --version ===" | Out-File -FilePath diag.txt -Append -Encoding utf8
          cmake --version 2>&1 | Out-File -FilePath diag.txt -Append -Encoding utf8
          "=== where cmake ===" | Out-File -FilePath diag.txt -Append -Encoding utf8
          where.exe cmake 2>&1 | Out-File -FilePath diag.txt -Append -Encoding utf8
          "=== systeminfo ===" | Out-File -FilePath diag.txt -Append -Encoding utf8
          systeminfo 2>&1 | Out-File -FilePath diag.txt -Append -Encoding utf8
          "=== dir ===" | Out-File -FilePath diag.txt -Append -Encoding utf8
          dir 2>&1 | Out-File -FilePath diag.txt -Append -Encoding utf8

      - name: Upload diagnostics artifact
        uses: actions/upload-artifact@v4
        with:
          name: diagnostic-${{ matrix.os }}-${{ github.run_id }}
          path: diag.txt
