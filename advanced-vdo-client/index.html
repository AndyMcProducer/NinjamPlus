<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>NINJAM Launcher</title>
    <style>
        * { box-sizing: border-box; }
        html, body { margin: 0; width: 100%; height: 100%; }
        body {
            background: #101520;
            color: #e7eaf0;
            font-family: "Segoe UI", Arial, sans-serif;
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 8px;
            padding: 8px;
        }
        .bar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #2a3450;
            background: #151d2d;
        }
        .bar button,
        .bar select,
        .bar input {
            height: 30px;
            border: 1px solid #3f4f73;
            border-radius: 4px;
            background: #1d2740;
            color: #e7eaf0;
        }
        .bar button {
            cursor: pointer;
            padding: 0 10px;
        }
        .bar select {
            padding: 0 8px;
        }
        .bar input[type="range"] {
            width: 88px;
            padding: 0;
        }
        .bar input[type="checkbox"] {
            width: 16px;
            height: 16px;
        }
        .bar button:hover {
            background: #293655;
        }
        .obs-tools,
        .camera-tools {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }
        .camera-bg-input {
            width: min(260px, 34vw);
            min-width: 160px;
        }
        .obs-control {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: #afbbd3;
            white-space: nowrap;
        }
        .room {
            font-size: 12px;
            color: #9fb0cf;
            padding: 0 6px;
        }
        .peer-offsets {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }
        .peer {
            display: flex;
            align-items: center;
            gap: 4px;
            border: 1px solid #2f3a58;
            border-radius: 4px;
            padding: 3px 5px;
            background: #121a2b;
        }
        .peer-name {
            font-size: 12px;
            color: #c5d1e6;
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .peer-light {
            width: 11px;
            height: 11px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.45);
            background: #cf4343;
            box-shadow: 0 0 7px rgba(207,67,67,0.75);
            cursor: pointer;
            padding: 0;
            flex: 0 0 auto;
        }
        .peer-light.ok {
            background: #3ed06e;
            box-shadow: 0 0 7px rgba(62,208,110,0.75);
        }
        .peer-light:focus-visible {
            outline: 2px solid #8fb7ff;
            outline-offset: 2px;
        }
        .peer button {
            height: 24px;
            min-width: 34px;
            padding: 0 7px;
            font-size: 12px;
        }
        .peer-offset {
            min-width: 50px;
            text-align: right;
            font-size: 12px;
            color: #d5dded;
        }
        .peer-metrics {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 2px;
            min-width: 170px;
        }
        .peer-latency {
            min-width: 170px;
            text-align: right;
            font-size: 11px;
            color: #8fa4c9;
            white-space: nowrap;
        }
        .peer-latency.warn {
            color: #f6ba5f;
        }
        .peer-latency.ok {
            color: #91d98e;
        }
        .header-meta {
            margin-left: auto;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            flex: 0 0 auto;
        }
        .status {
            font-size: 12px;
            color: #afbbd3;
        }
        .vdo-credit {
            display: block;
            width: auto;
            height: 36px;
            max-width: 190px;
            object-fit: contain;
            flex: 0 0 auto;
        }
        .frame-wrap {
            border: 1px solid #2a3450;
            border-radius: 6px;
            overflow: hidden;
            background: #000;
            position: relative;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
            background: #000;
        }
    </style>
</head>
<body>
    <div class="bar">
        <span class="room" id="roomText"></span>
        <div class="obs-tools">
            <label class="obs-control" for="obsLayout">OBS view
                <select id="obsLayout">
                    <option value="tiles">Tiles</option>
                    <option value="rows">Rows</option>
                    <option value="columns">Columns</option>
                </select>
            </label>
            <label class="obs-control" for="obsSource">Source
                <select id="obsSource">
                    <option value="0">All cams</option>
                    <option value="1">Cam slot 1</option>
                    <option value="2">Cam slot 2</option>
                    <option value="3">Cam slot 3</option>
                    <option value="4">Cam slot 4</option>
                    <option value="5">Cam slot 5</option>
                    <option value="6">Cam slot 6</option>
                    <option value="7">Cam slot 7</option>
                    <option value="8">Cam slot 8</option>
                    <option value="9">Cam slot 9</option>
                    <option value="10">Cam slot 10</option>
                    <option value="11">Cam slot 11</option>
                    <option value="12">Cam slot 12</option>
                </select>
            </label>
            <button id="obsBtn">Copy OBS Link</button>
        </div>
        <div class="camera-tools">
            <label class="obs-control" for="vdoCameraCodec">Codec
                <select id="vdoCameraCodec">
                    <option value="default">Auto</option>
                    <option value="vp8">VP8</option>
                    <option value="vp9">VP9</option>
                    <option value="h264">H.264</option>
                    <option value="av1">AV1</option>
                </select>
            </label>
            <label class="obs-control" for="vdoCameraQuality">Quality
                <select id="vdoCameraQuality">
                    <option value="default">Default</option>
                    <option value="1080p60">1080p60 high</option>
                    <option value="1080p30">1080p30</option>
                    <option value="720p60">720p60</option>
                    <option value="720p30">720p30</option>
                    <option value="360p30">360p30</option>
                </select>
            </label>
            <label class="obs-control" for="vdoCameraFx">Camera FX
                <select id="vdoCameraFx">
                    <option value="off">Off</option>
                    <option value="blur">Blur background</option>
                    <option value="remove">Remove background</option>
                    <option value="green">Green screen</option>
                    <option value="image">Image background</option>
                </select>
            </label>
            <label class="obs-control" for="vdoCameraFxStrength">Amount
                <input id="vdoCameraFxStrength" type="range" min="1" max="20" value="4">
            </label>
            <label class="obs-control" for="vdoCameraBgImage">Image URL
                <input id="vdoCameraBgImage" class="camera-bg-input" type="url" placeholder="https://...">
            </label>
        </div>
        <div class="peer-offsets" id="peerOffsets"></div>
        <div class="header-meta">
            <span class="status" id="statusText"></span>
            <img class="vdo-credit" src="PoweredByVDONinja.png" alt="" aria-hidden="true">
        </div>
    </div>
    <div class="frame-wrap">
        <iframe id="appFrame" allow="camera; microphone; fullscreen"></iframe>
    </div>
    <script>
        const query = new URLSearchParams(window.location.search);
        const roomText = document.getElementById('roomText');
        const obsBtn = document.getElementById('obsBtn');
        const obsLayout = document.getElementById('obsLayout');
        const obsSource = document.getElementById('obsSource');
        const vdoCameraCodec = document.getElementById('vdoCameraCodec');
        const vdoCameraQuality = document.getElementById('vdoCameraQuality');
        const vdoCameraFx = document.getElementById('vdoCameraFx');
        const vdoCameraFxStrength = document.getElementById('vdoCameraFxStrength');
        const vdoCameraBgImage = document.getElementById('vdoCameraBgImage');
        const peerOffsets = document.getElementById('peerOffsets');
        const statusText = document.getElementById('statusText');
        const appFrame = document.getElementById('appFrame');

        const roomParam = query.get('room') || '';
        const ninjamServer = query.get('ninjamServer') || '';
        const roomFromServer = ninjamServer ? ninjamServer.replace(/\./g, '_') : '';
        const resolvedRoom = roomParam || roomFromServer || 'ninjam';
        const intervalSource = query.get('intervalSource') || (window.location.origin + '/intervals');
        roomText.textContent = 'Room: ' + resolvedRoom;

        function normalizeObsLayout(value) {
            const layout = String(value || 'tiles').toLowerCase();
            return layout === 'rows' || layout === 'columns' ? layout : 'tiles';
        }

        function normalizeObsSlot(value) {
            const slot = parseInt(value || '0', 10);
            return isFinite(slot) ? Math.max(0, Math.min(12, slot)) : 0;
        }

        if (obsLayout) {
            obsLayout.value = normalizeObsLayout(query.get('obsLayout') || query.get('layout') || 'tiles');
        }
        if (obsSource) {
            obsSource.value = String(normalizeObsSlot(query.get('obsSlot') || query.get('slot') || '0'));
        }

        function normalizeCameraFx(value) {
            const fx = String(value || 'off').trim().toLowerCase();
            if (fx === 'blur' || fx === '3' || fx === '3a') return 'blur';
            if (fx === 'remove' || fx === 'transparent' || fx === 'background-remove' || fx === 'backgroundremove' || fx === '16') return 'remove';
            if (fx === 'green' || fx === 'greenscreen' || fx === 'green-screen' || fx === '4') return 'green';
            if (fx === 'image' || fx === 'virtual' || fx === 'virtual-background' || fx === 'background' || fx === '5') return 'image';
            return 'off';
        }

        function normalizeCameraFxStrength(value) {
            const strength = parseInt(value || '4', 10);
            return isFinite(strength) ? Math.max(1, Math.min(20, strength)) : 4;
        }

        function normalizeVdoQualityPreset(value) {
            const preset = String(value || 'default').trim().toLowerCase();
            if (preset === '1080p60' || preset === 'high' || preset === 'fullhd60') return '1080p60';
            if (preset === '1080p30' || preset === 'fullhd30') return '1080p30';
            if (preset === '720p60' || preset === 'hd60') return '720p60';
            if (preset === '720p30' || preset === 'hd30') return '720p30';
            if (preset === '360p30' || preset === 'low') return '360p30';
            return 'default';
        }

        function normalizeVdoCodec(value) {
            const codec = String(value || 'default').trim().toLowerCase();
            if (codec === 'vp8') return 'vp8';
            if (codec === 'vp9') return 'vp9';
            if (codec === 'h264' || codec === '264' || codec === 'avc') return 'h264';
            if (codec === 'av1') return 'av1';
            return 'default';
        }

        function queryFpsValue() {
            return parseInt(query.get('fps') || query.get('fr') || query.get('frameRate') || '', 10) || 0;
        }

        function initialVdoQualityPreset() {
            const directQuality = query.get('cameraQuality') || query.get('vdoQuality');
            if (directQuality) return normalizeVdoQualityPreset(directQuality);
            const quality = String(query.get('quality') || query.get('q') || '').trim().toLowerCase();
            const fps = queryFpsValue();
            if ((quality === '0' || quality === '1080' || quality === '1080p' || quality === 'fullhd' || quality === 'high') && fps >= 60) return '1080p60';
            if ((quality === '0' || quality === '1080' || quality === '1080p' || quality === 'fullhd' || quality === 'high') && fps > 0 && fps <= 30) return '1080p30';
            if ((quality === '1' || quality === '720' || quality === '720p' || quality === 'hd') && fps >= 60) return '720p60';
            if ((quality === '1' || quality === '720' || quality === '720p' || quality === 'hd') && fps > 0 && fps <= 30) return '720p30';
            if ((quality === '2' || quality === '360' || quality === '360p' || quality === 'low') && fps > 0 && fps <= 30) return '360p30';
            return 'default';
        }

        function initialVdoCodec() {
            return normalizeVdoCodec(query.get('cameraCodec') || query.get('vdoCodec') || query.get('codec') || query.get('videocodec') || 'default');
        }

        function initialCameraFx() {
            const directFx = query.get('cameraFx') || query.get('vdoFx') || query.get('videoFx');
            if (directFx) return normalizeCameraFx(directFx);
            return normalizeCameraFx(query.get('effects') || query.get('effect') || 'off');
        }

        function updateCameraFxControls() {
            const fx = normalizeCameraFx(vdoCameraFx ? vdoCameraFx.value : 'off');
            if (vdoCameraFxStrength) {
                vdoCameraFxStrength.disabled = fx !== 'blur';
            }
            if (vdoCameraBgImage) {
                vdoCameraBgImage.disabled = fx !== 'image';
            }
        }

        function applyCameraFxToMainParams(params) {
            params.delete('effects');
            params.delete('effect');
            params.delete('effectvalue');
            params.delete('ev');
            params.delete('imagelist');
            params.delete('cameraQuality');
            params.delete('vdoQuality');
            params.delete('quality');
            params.delete('q');
            params.delete('fps');
            params.delete('fr');
            params.delete('frameRate');
            params.delete('bitrate');
            params.delete('videobitrate');
            params.delete('vb');
            params.delete('cameraCodec');
            params.delete('vdoCodec');
            params.delete('codec');
            params.delete('codecs');
            params.delete('videocodec');

            const codec = normalizeVdoCodec(vdoCameraCodec ? vdoCameraCodec.value : 'default');
            const quality = normalizeVdoQualityPreset(vdoCameraQuality ? vdoCameraQuality.value : 'default');
            const fx = normalizeCameraFx(vdoCameraFx ? vdoCameraFx.value : 'off');
            const strength = normalizeCameraFxStrength(vdoCameraFxStrength ? vdoCameraFxStrength.value : '4');
            const bgImage = String(vdoCameraBgImage ? vdoCameraBgImage.value : '').trim();

            if (codec !== 'default') {
                params.set('cameraCodec', codec);
            }
            if (quality !== 'default') {
                params.set('cameraQuality', quality);
            }
            if (fx !== 'off') {
                params.set('cameraFx', fx);
            } else {
                params.delete('cameraFx');
            }
            if (fx === 'blur') {
                params.set('cameraFxStrength', String(strength));
            } else {
                params.delete('cameraFxStrength');
            }
            if (fx === 'image' && bgImage) {
                params.set('cameraBgImage', bgImage);
            } else {
                params.delete('cameraBgImage');
            }
        }

        if (vdoCameraCodec) {
            vdoCameraCodec.value = initialVdoCodec();
        }
        if (vdoCameraQuality) {
            vdoCameraQuality.value = initialVdoQualityPreset();
        }
        if (vdoCameraFx) {
            vdoCameraFx.value = initialCameraFx();
        }
        if (vdoCameraFxStrength) {
            vdoCameraFxStrength.value = String(normalizeCameraFxStrength(query.get('cameraFxStrength') || query.get('effectvalue') || query.get('ev') || '4'));
        }
        if (vdoCameraBgImage) {
            vdoCameraBgImage.value = query.get('cameraBgImage') || query.get('backgroundImage') || query.get('bgImage') || '';
        }
        updateCameraFxControls();

        function buildMainUrl() {
            const p = new URLSearchParams(window.location.search);
            p.delete('view');
            applyCameraFxToMainParams(p);
            p.set('helperLoad', String(Date.now()));
            const q = p.toString();
            return q ? ('/app?' + q) : '/app';
        }

        function buildObsUrl() {
            const url = new URL('/zap-wall', window.location.origin);
            const layout = normalizeObsLayout(obsLayout ? obsLayout.value : 'tiles');
            const slot = normalizeObsSlot(obsSource ? obsSource.value : '0');
            url.searchParams.set('layout', layout);
            if (slot > 0) {
                url.searchParams.set('slot', String(slot));
            }
            return url.toString();
        }

        function copyTextToClipboard(text) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                return navigator.clipboard.writeText(text);
            }
            return new Promise(function (resolve, reject) {
                try {
                    const temp = document.createElement('textarea');
                    temp.value = text;
                    temp.style.position = 'fixed';
                    temp.style.left = '-9999px';
                    document.body.appendChild(temp);
                    temp.focus();
                    temp.select();
                    const ok = document.execCommand('copy');
                    document.body.removeChild(temp);
                    if (ok) resolve();
                    else reject(new Error('copy failed'));
                } catch (err) {
                    reject(err);
                }
            });
        }

        function normalizeUserId(userId) {
            let v = String(userId || '').trim().toLowerCase();
            v = v.replace(/^anonymous:/, '');
            v = v.replace(/^guest:/, '');
            v = v.replace(/\s+/g, '');
            v = v.replace(/@.*$/, '');
            v = v.replace(/[^a-z0-9._-]/g, '');
            return v;
        }

        function offsetStorageKey(userId) {
            return 'ninjamPeerOffset:' + resolvedRoom + ':' + normalizeUserId(userId);
        }

        function getOffsetMs(userId) {
            const raw = window.localStorage ? window.localStorage.getItem(offsetStorageKey(userId)) : '';
            const parsed = parseInt(raw || '', 10);
            return isFinite(parsed) ? parsed : 0;
        }

        function setOffsetMs(userId, value) {
            const v = Math.max(-6000, Math.min(6000, Math.round(value)));
            if (window.localStorage) {
                window.localStorage.setItem(offsetStorageKey(userId), String(v));
            }
            return v;
        }

        function fmt(v) {
            if (v > 0) return '+' + v + 'ms';
            if (v < 0) return String(v) + 'ms';
            return '0ms';
        }

        const measuredBufferMsByUser = {};
        const latencyDebugByUser = {};
        const syncDiagnosticsByUser = {};
        const userLastSeenAt = {};
        const userLastSampleKey = {};
        let lastRosterRevision = '';
        const userStaleMs = 12000;

        function getMeasuredBufferMs(userId) {
            const v = measuredBufferMsByUser[normalizeUserId(userId)];
            return (typeof v === 'number' && isFinite(v) && v >= 0) ? Math.round(v) : null;
        }

        function getUserDisplayText(userId) {
            const measured = getMeasuredBufferMs(userId);
            const measuredText = measured !== null ? String(measured) + 'ms' : '--';
            return fmt(getOffsetMs(userId)) + ' | ' + measuredText;
        }

        function getLatencyDebug(userId) {
            return latencyDebugByUser[normalizeUserId(userId)] || null;
        }

        function getSyncDiagnostics(userId) {
            return syncDiagnosticsByUser[normalizeUserId(userId)] || null;
        }

        function fmtMeasured(v) {
            return (typeof v === 'number' && isFinite(v) && v >= 0) ? (String(Math.round(v)) + 'ms') : '--';
        }

        function getMessageNumber(msg, keyNames) {
            if (!msg || typeof msg !== 'object') {
                return NaN;
            }
            for (let i = 0; i < keyNames.length; i++) {
                const value = msg[keyNames[i]];
                if (typeof value === 'number' && isFinite(value)) {
                    return value;
                }
            }
            return NaN;
        }

        function getNonNegativeMessageMs(msg, keyNames) {
            const value = getMessageNumber(msg, keyNames);
            return (isFinite(value) && value >= 0) ? value : NaN;
        }

        function resolveIncomingBufferMs(msg) {
            const measuredAudioDelayMs = getNonNegativeMessageMs(msg, ['measuredAudioDelayMs', 'audioDelayMs']);
            const senderServerLatencyMs = getNonNegativeMessageMs(msg, ['senderServerLatencyMs', 'remoteServerLatencyMs']);
            const receiverServerLatencyMs = getNonNegativeMessageMs(msg, ['receiverServerLatencyMs', 'localServerLatencyMs']);
            if (isFinite(measuredAudioDelayMs) && (isFinite(senderServerLatencyMs) || isFinite(receiverServerLatencyMs))) {
                const sender = isFinite(senderServerLatencyMs) ? senderServerLatencyMs : 0;
                const receiver = isFinite(receiverServerLatencyMs) ? receiverServerLatencyMs : 0;
                return Math.max(0, Math.round(measuredAudioDelayMs - sender - receiver));
            }

            const receiverBufferMs = getNonNegativeMessageMs(msg, ['receiverBufferMs']);
            if (isFinite(receiverBufferMs)) {
                return Math.max(0, Math.round(receiverBufferMs));
            }

            const bufferTotalMs = getNonNegativeMessageMs(msg, ['bufferTotalMs']);
            if (isFinite(bufferTotalMs)) {
                return Math.max(0, Math.round(bufferTotalMs));
            }

            if (isFinite(measuredAudioDelayMs)) {
                return Math.max(0, Math.round(measuredAudioDelayMs));
            }

            return NaN;
        }

        function getIncomingVdoLatencyMs(msg) {
            const latencyMs = getNonNegativeMessageMs(msg, [
                'cameraSendLatencyMs', 'vdoCameraLatencyMs', 'vdoSendLatencyMs',
                'cameraLatencyMs', 'videoSendLatencyMs', 'senderVideoLatencyMs',
                'sendLatencyMs', 'senderLatencyMs', 'captureLatencyMs', 'captureDelayMs',
                'encodeLatencyMs', 'encoderLatencyMs', 'encodeDelayMs', 'encoderDelayMs'
            ]);
            return isFinite(latencyMs) ? Math.max(0, Math.min(6000, Math.round(latencyMs))) : NaN;
        }

        function getSyncDiagnosticText(userId) {
            const sync = getSyncDiagnostics(userId);
            return sync ? sync.text : 'interval pending';
        }

        function getSyncDiagnosticCopyText(userId) {
            const key = normalizeUserId(userId);
            return key + ': ' + getSyncDiagnosticText(key);
        }

        function getUserLatencyText(userId) {
            const measured = getMeasuredBufferMs(userId);
            const debug = getLatencyDebug(userId);
            if (!debug) {
                return 'base ' + fmtMeasured(measured);
            }
            const sender = fmtMeasured(debug.senderServerLatencyMs);
            const receiver = fmtMeasured(debug.receiverServerLatencyMs);
            const total = fmtMeasured(measured !== null ? measured : debug.bufferMs);
            const route = fmtMeasured(debug.serverRouteLatencyMs);
            const routeText = debug.serverRouteLatencyMs !== null ? (' | route ' + route) : (' | srv ' + sender + ' + ' + receiver);
            const vdoLatency = fmtMeasured(debug.vdoLatencyMs);
            const vdoText = debug.vdoLatencyMs !== null ? (' | vdo ' + vdoLatency) : '';
            return 'base ' + total + routeText + vdoText;
        }

        function getUserLatencyClass(userId) {
            const sync = getSyncDiagnostics(userId);
            if (!sync) {
                return 'peer-latency warn';
            }
            return sync.ok ? 'peer-latency ok' : 'peer-latency warn';
        }

        function updatePeerSyncLight(userId) {
            const key = normalizeUserId(userId);
            const lightId = 'peer-sync-light-' + key.replace(/[^a-zA-Z0-9_-]/g, '_');
            const light = document.getElementById(lightId);
            if (!light) {
                return;
            }
            const sync = getSyncDiagnostics(key);
            const ok = !!(sync && sync.ok);
            const copyText = getSyncDiagnosticCopyText(key);
            light.className = ok ? 'peer-light ok' : 'peer-light';
            light.title = copyText + '\nClick to copy';
            light.setAttribute('aria-label', copyText);
        }

        function boolProp(msg, key) {
            return msg && Object.prototype.hasOwnProperty.call(msg, key) ? msg[key] === true : null;
        }

        function buildSyncDiagnostics(msg, bufferVal) {
            const serverRouteLatencyMs = getNonNegativeMessageMs(msg, ['serverRouteLatencyMs']);
            const intervalSignalAgeMs = getNonNegativeMessageMs(msg, ['intervalSignalAgeMs']);
            const serverRouteAgeMs = getNonNegativeMessageMs(msg, ['serverRouteAgeMs']);
            const hasBuffer = (isFinite(bufferVal) && bufferVal >= 0) || boolProp(msg, 'bufferCalculated') === true;
            const hasInterval = boolProp(msg, 'intervalMeasurementSeen') === true
                || isFinite(getMessageNumber(msg, ['lastIntervalMeasurementMs', 'averageIntervalMeasurementMs', 'firmIntervalMeasurementMs']))
                || hasBuffer;
            const explicitServerRoute = boolProp(msg, 'serverRouteLatencyReady');
            const hasServerRoute = explicitServerRoute !== null ? explicitServerRoute : isFinite(serverRouteLatencyMs);
            const parts = [];
            if (!hasInterval) {
                parts.push(isFinite(intervalSignalAgeMs) ? 'waiting local marker' : 'interval missing');
            } else if (!hasBuffer) {
                parts.push('buffer pending');
            } else {
                parts.push('sync ok');
            }
            if (hasServerRoute) {
                parts.push('route ok');
            } else {
                parts.push(isFinite(serverRouteAgeMs) ? 'route aging' : 'route pending');
            }
            return {
                ok: hasInterval && hasBuffer,
                text: parts.join(' | ')
            };
        }

        function pushOffsetToFrame(userId) {
            if (!appFrame || !appFrame.contentWindow) {
                return;
            }
            appFrame.contentWindow.postMessage({
                type: 'ninjamOffsetUpdate',
                userId: String(userId),
                offsetMs: getOffsetMs(userId)
            }, window.location.origin);
        }

        function pushAllOffsetsToFrame() {
            const users = Object.keys(knownUsers);
            for (let i = 0; i < users.length; i++) {
                pushOffsetToFrame(users[i]);
            }
        }

        const knownUsers = {};

        function addUser(userId) {
            const key = normalizeUserId(userId);
            if (!key) return false;
            if (knownUsers[key]) return false;
            knownUsers[key] = String(userId || '').trim() || key;
            return true;
        }

        function markUserSeen(userId) {
            const key = normalizeUserId(userId);
            if (!key) return;
            userLastSeenAt[key] = Date.now();
        }

        function buildUserSampleKey(msg, bufferVal) {
            return [
                String(msg.interval ?? ''),
                String(msg.syncTag ?? ''),
                String(msg.videoClockMs ?? ''),
                String(msg.timecode ?? ''),
                String(msg.eventId ?? ''),
                String(msg.bufferRefreshEventId ?? ''),
                String(msg.refreshBuffer ? 1 : 0),
                isFinite(bufferVal) ? String(Math.round(bufferVal)) : ''
            ].join('|');
        }

        function pruneInactiveUsers() {
            const now = Date.now();
            let changed = false;
            const users = Object.keys(knownUsers);
            for (let i = 0; i < users.length; i++) {
                const userId = users[i];
                const lastSeen = userLastSeenAt[userId] || 0;
                if ((now - lastSeen) > userStaleMs) {
                    delete knownUsers[userId];
                    delete measuredBufferMsByUser[userId];
                    delete latencyDebugByUser[userId];
                    delete syncDiagnosticsByUser[userId];
                    delete userLastSeenAt[userId];
                    delete userLastSampleKey[userId];
                    changed = true;
                }
            }
            if (changed) {
                renderUsers();
            }
        }

        function pruneUsersMissingFromPayload(activeUserKeys) {
            const activeNow = {};
            for (let i = 0; i < activeUserKeys.length; i++) {
                const key = normalizeUserId(activeUserKeys[i]);
                if (key) {
                    activeNow[key] = true;
                }
            }

            let changed = false;
            const users = Object.keys(knownUsers);
            for (let i = 0; i < users.length; i++) {
                const userId = users[i];
                if (activeNow[userId]) {
                    continue;
                }
                delete knownUsers[userId];
                delete measuredBufferMsByUser[userId];
                delete latencyDebugByUser[userId];
                delete syncDiagnosticsByUser[userId];
                delete userLastSeenAt[userId];
                delete userLastSampleKey[userId];
                changed = true;
            }
            if (changed) {
                renderUsers();
            }
        }

        function applyActiveRosterMessage(msg) {
            const revision = String(msg.revision ?? msg.videoClockMs ?? '');
            if (revision && lastRosterRevision === revision) {
                return;
            }
            if (revision) {
                lastRosterRevision = revision;
            }
            pruneUsersMissingFromPayload(Array.isArray(msg.users) ? msg.users : []);
        }

        function loadUsersFromStorage() {
            if (!window.localStorage) return false;
            const prefix = 'ninjamPeerOffset:' + resolvedRoom + ':';
            let changed = false;
            for (let i = 0; i < window.localStorage.length; i++) {
                const k = window.localStorage.key(i) || '';
                if (!k.startsWith(prefix)) continue;
                const userId = k.slice(prefix.length);
                if (addUser(userId)) changed = true;
            }
            return changed;
        }

        function renderUsers() {
            const users = Object.keys(knownUsers).sort();
            peerOffsets.innerHTML = '';
            if (!users.length) {
                statusText.textContent = 'Waiting for remote users';
                return;
            }
            for (let i = 0; i < users.length; i++) {
                const userId = users[i];
                const wrap = document.createElement('div');
                wrap.className = 'peer';

                const nameEl = document.createElement('span');
                nameEl.className = 'peer-name';
                nameEl.textContent = knownUsers[userId] || userId;

                const statusLight = document.createElement('button');
                statusLight.type = 'button';
                statusLight.id = 'peer-sync-light-' + userId.replace(/[^a-zA-Z0-9_-]/g, '_');
                const syncLight = function () {
                    const sync = getSyncDiagnostics(userId);
                    const ok = !!(sync && sync.ok);
                    const copyText = getSyncDiagnosticCopyText(userId);
                    statusLight.className = ok ? 'peer-light ok' : 'peer-light';
                    statusLight.title = copyText + '\nClick to copy';
                    statusLight.setAttribute('aria-label', copyText);
                };
                statusLight.addEventListener('click', function () {
                    copyTextToClipboard(getSyncDiagnosticCopyText(userId))
                        .then(function () { statusText.textContent = 'Sync status copied'; })
                        .catch(function () { statusText.textContent = 'Could not copy sync status'; });
                });

                const minusBtn = document.createElement('button');
                minusBtn.type = 'button';
                minusBtn.textContent = '-20';

                const plusBtn = document.createElement('button');
                plusBtn.type = 'button';
                plusBtn.textContent = '+20';

                const resetBtn = document.createElement('button');
                resetBtn.type = 'button';
                resetBtn.textContent = 'Reset';

                const metricsEl = document.createElement('div');
                metricsEl.className = 'peer-metrics';

                const offsetEl = document.createElement('span');
                offsetEl.className = 'peer-offset';
                offsetEl.id = 'peer-offset-display-' + userId.replace(/[^a-zA-Z0-9_-]/g, '_');

                const latencyEl = document.createElement('span');
                latencyEl.className = 'peer-latency';
                latencyEl.id = 'peer-latency-display-' + userId.replace(/[^a-zA-Z0-9_-]/g, '_');

                const syncOffset = function () {
                    syncLight();
                    offsetEl.textContent = getUserDisplayText(userId);
                    latencyEl.textContent = getUserLatencyText(userId);
                    latencyEl.className = getUserLatencyClass(userId);
                };
                syncOffset();

                minusBtn.addEventListener('click', function () {
                    setOffsetMs(userId, getOffsetMs(userId) - 20);
                    syncOffset();
                    pushOffsetToFrame(userId);
                });
                plusBtn.addEventListener('click', function () {
                    setOffsetMs(userId, getOffsetMs(userId) + 20);
                    syncOffset();
                    pushOffsetToFrame(userId);
                });
                resetBtn.addEventListener('click', function () {
                    setOffsetMs(userId, 0);
                    syncOffset();
                    pushOffsetToFrame(userId);
                });

                wrap.appendChild(statusLight);
                wrap.appendChild(nameEl);
                wrap.appendChild(minusBtn);
                wrap.appendChild(plusBtn);
                wrap.appendChild(resetBtn);
                metricsEl.appendChild(offsetEl);
                metricsEl.appendChild(latencyEl);
                wrap.appendChild(metricsEl);
                peerOffsets.appendChild(wrap);
            }
            statusText.textContent = 'Remote users: ' + users.length;
        }

        function processIntervalData(payload) {
            const items = Array.isArray(payload) ? payload : [payload];
            let changed = false;
            let updated = false;
            for (let i = 0; i < items.length; i++) {
                const msg = items[i] || {};
                const type = String(msg.type || '');
                if (type === 'activeRoster') {
                    applyActiveRosterMessage(msg);
                    continue;
                }
                if (type !== 'remoteTimecode' && type !== 'videoTimecode') {
                    continue;
                }
                const userId = msg.userId || msg.userKey || '';
                if (addUser(userId)) {
                    changed = true;
                }
                const normalizedUserId = normalizeUserId(userId);
                const bufferVal = resolveIncomingBufferMs(msg);
                const senderServerLatencyMs = getNonNegativeMessageMs(msg, ['senderServerLatencyMs', 'remoteServerLatencyMs']);
                const receiverServerLatencyMs = getNonNegativeMessageMs(msg, ['receiverServerLatencyMs', 'localServerLatencyMs']);
                const serverRouteLatencyMs = getNonNegativeMessageMs(msg, ['serverRouteLatencyMs']);
                const vdoLatencyMs = getIncomingVdoLatencyMs(msg);
                const intervalSignalAgeMs = getNonNegativeMessageMs(msg, ['intervalSignalAgeMs']);
                const serverRouteAgeMs = getNonNegativeMessageMs(msg, ['serverRouteAgeMs']);
                const syncDiagnostics = buildSyncDiagnostics(msg, bufferVal);
                const sampleKey = buildUserSampleKey(msg, bufferVal)
                    + '|' + (isFinite(senderServerLatencyMs) ? String(Math.round(senderServerLatencyMs)) : '')
                    + '|' + (isFinite(receiverServerLatencyMs) ? String(Math.round(receiverServerLatencyMs)) : '')
                    + '|' + (isFinite(serverRouteLatencyMs) ? String(Math.round(serverRouteLatencyMs)) : '')
                    + '|' + (isFinite(vdoLatencyMs) ? String(Math.round(vdoLatencyMs)) : '')
                    + '|' + (isFinite(intervalSignalAgeMs) ? String(Math.round(intervalSignalAgeMs / 1000)) : '')
                    + '|' + (isFinite(serverRouteAgeMs) ? String(Math.round(serverRouteAgeMs / 1000)) : '')
                    + '|' + syncDiagnostics.text;
                if (userLastSampleKey[normalizedUserId] === sampleKey) {
                    continue;
                }
                userLastSampleKey[normalizedUserId] = sampleKey;
                markUserSeen(normalizedUserId);
                syncDiagnosticsByUser[normalizedUserId] = syncDiagnostics;
                if (isFinite(bufferVal) && bufferVal >= 0) {
                    measuredBufferMsByUser[normalizedUserId] = Math.round(bufferVal);
                    latencyDebugByUser[normalizedUserId] = {
                        senderServerLatencyMs: (isFinite(senderServerLatencyMs) && senderServerLatencyMs >= 0) ? Math.round(senderServerLatencyMs) : null,
                        receiverServerLatencyMs: (isFinite(receiverServerLatencyMs) && receiverServerLatencyMs >= 0) ? Math.round(receiverServerLatencyMs) : null,
                        serverRouteLatencyMs: (isFinite(serverRouteLatencyMs) && serverRouteLatencyMs >= 0) ? Math.round(serverRouteLatencyMs) : null,
                        vdoLatencyMs: (isFinite(vdoLatencyMs) && vdoLatencyMs >= 0) ? Math.round(vdoLatencyMs) : null,
                        bufferMs: Math.round(bufferVal)
                    };
                    updated = true;
                    const offsetId = 'peer-offset-display-' + normalizedUserId.replace(/[^a-zA-Z0-9_-]/g, '_');
                    const offsetEl = document.getElementById(offsetId);
                    if (offsetEl) {
                        offsetEl.textContent = getUserDisplayText(normalizedUserId);
                    }
                    const latencyId = 'peer-latency-display-' + normalizedUserId.replace(/[^a-zA-Z0-9_-]/g, '_');
                    const latencyEl = document.getElementById(latencyId);
                    if (latencyEl) {
                        latencyEl.textContent = getUserLatencyText(normalizedUserId);
                        latencyEl.className = getUserLatencyClass(normalizedUserId);
                    }
                    updatePeerSyncLight(normalizedUserId);
                } else {
                    const latencyId = 'peer-latency-display-' + normalizedUserId.replace(/[^a-zA-Z0-9_-]/g, '_');
                    const latencyEl = document.getElementById(latencyId);
                    if (latencyEl) {
                        latencyEl.textContent = getUserLatencyText(normalizedUserId);
                        latencyEl.className = getUserLatencyClass(normalizedUserId);
                    }
                    updatePeerSyncLight(normalizedUserId);
                }
            }
            if (changed) {
                renderUsers();
                return;
            }
            if (updated) {
                statusText.textContent = 'Remote users: ' + Object.keys(knownUsers).length;
            }
            pruneInactiveUsers();
        }

        async function pollIntervalUsers() {
            try {
                const res = await fetch(intervalSource, { cache: 'no-store' });
                if (!res.ok) return;
                const data = await res.json();
                processIntervalData(data);
            } catch (e) {
            }
        }

        function startUserDiscovery() {
            if (intervalSource.startsWith('ws:') || intervalSource.startsWith('wss:')) {
                try {
                    const ws = new WebSocket(intervalSource);
                    ws.onmessage = function (event) {
                        try {
                            const payload = JSON.parse(event.data);
                            processIntervalData(payload);
                        } catch (e) {
                        }
                    };
                } catch (e) {
                }
                return;
            }
            pollIntervalUsers();
            setInterval(pollIntervalUsers, 800);
        }

        obsBtn.addEventListener('click', function () {
            const slot = normalizeObsSlot(obsSource ? obsSource.value : '0');
            copyTextToClipboard(buildObsUrl())
                .then(function () {
                    statusText.textContent = slot > 0
                        ? ('OBS cam slot ' + slot + ' link copied')
                        : 'OBS all cams link copied';
                })
                .catch(function () { statusText.textContent = 'Could not copy OBS link'; });
        });

        function currentCameraSettings() {
            return {
                cameraCodec: normalizeVdoCodec(vdoCameraCodec ? vdoCameraCodec.value : 'default'),
                cameraQuality: normalizeVdoQualityPreset(vdoCameraQuality ? vdoCameraQuality.value : 'default'),
                cameraFx: normalizeCameraFx(vdoCameraFx ? vdoCameraFx.value : 'off'),
                cameraFxStrength: normalizeCameraFxStrength(vdoCameraFxStrength ? vdoCameraFxStrength.value : '4'),
                cameraBgImage: String(vdoCameraBgImage ? vdoCameraBgImage.value : '').trim()
            };
        }

        function replaceUrlWithCurrentCameraSettings() {
            const p = new URLSearchParams(window.location.search);
            applyCameraFxToMainParams(p);
            const next = window.location.pathname + (p.toString() ? ('?' + p.toString()) : '') + window.location.hash;
            window.history.replaceState(null, '', next);
        }

        function sendVdoCameraSettingsLive(changed) {
            updateCameraFxControls();
            replaceUrlWithCurrentCameraSettings();
            if (appFrame && appFrame.contentWindow) {
                appFrame.contentWindow.postMessage({
                    type: 'ninjam-vdo-camera-settings',
                    settings: currentCameraSettings(),
                    changed: changed || ''
                }, window.location.origin);
            }
            statusText.textContent = changed === 'codec'
                ? 'Codec saved for next VDO reconnect'
                : 'Camera settings sent to VDO live';
        }

        if (vdoCameraCodec) {
            vdoCameraCodec.addEventListener('change', function () { sendVdoCameraSettingsLive('codec'); });
        }
        if (vdoCameraQuality) {
            vdoCameraQuality.addEventListener('change', function () { sendVdoCameraSettingsLive('quality'); });
        }
        if (vdoCameraFx) {
            vdoCameraFx.addEventListener('change', function () { sendVdoCameraSettingsLive('fx'); });
        }
        if (vdoCameraFxStrength) {
            vdoCameraFxStrength.addEventListener('input', function () { sendVdoCameraSettingsLive('fx'); });
            vdoCameraFxStrength.addEventListener('change', function () { sendVdoCameraSettingsLive('fx'); });
        }
        if (vdoCameraBgImage) {
            vdoCameraBgImage.addEventListener('change', function () { sendVdoCameraSettingsLive('fx'); });
        }

        renderUsers();
        appFrame.addEventListener('load', pushAllOffsetsToFrame);
        appFrame.src = buildMainUrl();
        startUserDiscovery();
        setInterval(pruneInactiveUsers, 1500);
    </script>
</body>
</html>
