<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="icon" type="image/png" href="/icon.png">
    <title>NINJAM Advanced VDO Client</title>
    <style>
        * { box-sizing: border-box; }
        html, body { width: 100%; height: 100%; margin: 0; }
        body {
            background: #0a0b10;
            color: #e7eaf0;
            font-family: "Segoe UI", Arial, sans-serif;
        }
        .app {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-rows: auto 1fr;
        }
        .header {
            background: linear-gradient(180deg, #171a22 0%, #10131a 100%);
            border-bottom: 1px solid #2a3040;
            padding: 10px 14px;
            display: grid;
            gap: 4px;
        }
        .title {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.2px;
        }
        .meta {
            font-size: 13px;
            color: #aeb7c9;
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }
        .peer-statuses {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            font-size: 12px;
            align-items: center;
        }
        .peer-light-wrap {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: #aeb7c9;
            max-width: 150px;
        }
        .peer-light-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .peer-light {
            width: 11px;
            height: 11px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.45);
            background: #cf4343;
            box-shadow: 0 0 7px rgba(207,67,67,0.75);
            cursor: pointer;
            padding: 0;
            flex: 0 0 auto;
        }
        .peer-light.ok {
            background: #3ed06e;
            box-shadow: 0 0 7px rgba(62,208,110,0.75);
        }
        .peer-light:focus-visible {
            outline: 2px solid #8fb7ff;
            outline-offset: 2px;
        }
        .frame-wrap {
            width: 100%;
            height: 100%;
            background: #000;
        }
        #vdoFrame {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
            background: #000;
        }
        body.green-mode {
            background: #00ff00;
        }
        body.green-mode .app {
            grid-template-rows: 1fr;
        }
        body.green-mode .header {
            display: none;
        }
        body.green-mode .frame-wrap {
            background: #00ff00;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header" id="header">
            <div class="title">NINJAM video room</div>
            <div class="meta">
                <span id="roomValue"></span>
                <span id="labelValue"></span>
                <span id="syncValue"></span>
                <span id="peerStatusValue" class="peer-statuses"></span>
            </div>
        </div>
        <div class="frame-wrap">
            <iframe id="vdoFrame" allow="camera; microphone; fullscreen"></iframe>
        </div>
    </div>
    <script>
        const query = new URLSearchParams(window.location.search);
        const ninjamServer = query.get('ninjamServer') || '';
        const roomParam = query.get('room');
        const roomFromServer = ninjamServer ? ninjamServer.replace(/\./g, '_') : '';
        const resolvedRoom = roomParam || roomFromServer || 'ninjam';
        const minimumBufferMs = 0;

        function normalizeBufferMode(value) {
            const mode = String(value || '').trim().toLowerCase();
            if (mode === 'realtime' || mode === 'voice' || mode === 'voicechat') {
                return 'realtime';
            }
            return 'remote';
        }

        function normalizeCameraFx(value) {
            const fx = String(value || 'off').trim().toLowerCase();
            if (fx === 'blur' || fx === '3' || fx === '3a') return 'blur';
            if (fx === 'remove' || fx === 'transparent' || fx === 'background-remove' || fx === 'backgroundremove' || fx === '16') return 'remove';
            if (fx === 'green' || fx === 'greenscreen' || fx === 'green-screen' || fx === '4') return 'green';
            if (fx === 'image' || fx === 'virtual' || fx === 'virtual-background' || fx === 'background' || fx === '5') return 'image';
            return 'off';
        }

        function normalizeCameraFxStrength(value) {
            const strength = parseInt(value || '4', 10);
            return isFinite(strength) ? Math.max(1, Math.min(20, strength)) : 4;
        }

        function normalizeVdoQualityPreset(value) {
            const preset = String(value || 'default').trim().toLowerCase();
            if (preset === '1080p60' || preset === 'high' || preset === 'fullhd60') return '1080p60';
            if (preset === '1080p30' || preset === 'fullhd30') return '1080p30';
            if (preset === '720p60' || preset === 'hd60') return '720p60';
            if (preset === '720p30' || preset === 'hd30') return '720p30';
            if (preset === '360p30' || preset === 'low') return '360p30';
            return 'default';
        }

        function normalizeVdoCodec(value) {
            const codec = String(value || 'default').trim().toLowerCase();
            if (codec === 'vp8') return 'vp8';
            if (codec === 'vp9') return 'vp9';
            if (codec === 'h264' || codec === '264' || codec === 'avc') return 'h264';
            if (codec === 'av1') return 'av1';
            return 'default';
        }

        function queryFpsValue() {
            return parseInt(query.get('fps') || query.get('fr') || query.get('frameRate') || '', 10) || 0;
        }

        function initialVdoQualityPreset() {
            const directQuality = query.get('cameraQuality') || query.get('vdoQuality');
            if (directQuality) return normalizeVdoQualityPreset(directQuality);
            const quality = String(query.get('quality') || query.get('q') || '').trim().toLowerCase();
            const fps = queryFpsValue();
            if ((quality === '0' || quality === '1080' || quality === '1080p' || quality === 'fullhd' || quality === 'high') && fps >= 60) return '1080p60';
            if ((quality === '0' || quality === '1080' || quality === '1080p' || quality === 'fullhd' || quality === 'high') && fps > 0 && fps <= 30) return '1080p30';
            if ((quality === '1' || quality === '720' || quality === '720p' || quality === 'hd') && fps >= 60) return '720p60';
            if ((quality === '1' || quality === '720' || quality === '720p' || quality === 'hd') && fps > 0 && fps <= 30) return '720p30';
            if ((quality === '2' || quality === '360' || quality === '360p' || quality === 'low') && fps > 0 && fps <= 30) return '360p30';
            return 'default';
        }

        function initialVdoCodec() {
            return normalizeVdoCodec(query.get('cameraCodec') || query.get('vdoCodec') || query.get('codec') || query.get('videocodec') || 'default');
        }

        function initialCameraFx() {
            const directFx = query.get('cameraFx') || query.get('vdoFx') || query.get('videoFx');
            if (directFx) return normalizeCameraFx(directFx);
            return normalizeCameraFx(query.get('effects') || query.get('effect') || 'off');
        }

        const appState = {
            room: resolvedRoom,
            label: query.get('label') || 'NINJAM',
            store: query.get('store') || '',
            bg: query.get('bg') || '',
            intervalSource: query.get('intervalSource') || '',
            intervalPollMs: parseInt(query.get('intervalPollMs') || '', 10) || 500,
            requestedBufferMs: Math.max(minimumBufferMs, parseInt(query.get('buffer') || '', 10) || minimumBufferMs),
            chunkedMs: parseInt(query.get('chunked') || '', 10) || 120,
            ninjamServer: ninjamServer,
            initialBufferMode: normalizeBufferMode(query.get('bufferMode')),
            cameraCodec: initialVdoCodec(),
            cameraQuality: initialVdoQualityPreset(),
            cameraFx: initialCameraFx(),
            cameraFxStrength: normalizeCameraFxStrength(query.get('cameraFxStrength') || query.get('effectvalue') || query.get('ev') || '4'),
            cameraBgImage: query.get('cameraBgImage') || query.get('backgroundImage') || query.get('bgImage') || '',
            intervalMessages: 0
        };

        const vdoFrame = document.getElementById('vdoFrame');
        const roomValue = document.getElementById('roomValue');
        const labelValue = document.getElementById('labelValue');
        const syncValue = document.getElementById('syncValue');
        const peerStatusValue = document.getElementById('peerStatusValue');

        const ninjamSync = {
            intervalInfo: null,
            remoteTimecodes: {},
            remoteBuffers: {},
            remoteVoiceChatMode: {},
            remoteDiagnostics: {},
            userLastSeenAt: {},
            userLastSampleKey: {},
            setIntervalInfo(interval, pos, bpm, bpi, length, bufferMode, voiceChatMode) {
                this.intervalInfo = {
                    interval,
                    pos,
                    bpm,
                    bpi,
                    length: typeof length === 'number' ? length : 0,
                    bufferMode: normalizeBufferMode(bufferMode || (voiceChatMode ? 'realtime' : 'remote')),
                    voiceChatMode: !!voiceChatMode,
                    updatedAt: Date.now()
                };
            },
            setRemoteTimecode(userId, interval, timecode, bufferMs, sampleKey, voiceChatMode, diagnostics) {
                const key = normalizeUserId(userId);
                if (!key) {
                    return;
                }
                this.remoteVoiceChatMode[key] = !!voiceChatMode;
                if (diagnostics) {
                    this.remoteDiagnostics[key] = diagnostics;
                }
                if (this.userLastSampleKey[key] === sampleKey) {
                    this.userLastSeenAt[key] = Date.now();
                    return;
                }
                this.userLastSampleKey[key] = sampleKey;
                if (!this.remoteTimecodes[key]) {
                    this.remoteTimecodes[key] = {};
                }
                this.remoteTimecodes[key][interval] = {
                    timecode,
                    updatedAt: Date.now()
                };
                if (typeof bufferMs === 'number' && isFinite(bufferMs) && bufferMs >= 0) {
                    this.remoteBuffers[key] = Math.round(bufferMs);
                }
                this.userLastSeenAt[key] = Date.now();
            }
        };

        const vdoState = {
            iframeLoaded: false,
            streamIdByUser: {},
            targetIdByUser: {},
            labelByStreamId: {},
            lastAppliedBufferByUser: {},
            lastBufferRefreshIdByUser: {},
            bufferRefreshTimersByUser: {},
            bufferRefreshPendingUntilByUser: {},
            latencyMsByUser: {},
            latencyTargetMsByUser: {},
            latencyUpdatedAtByUser: {},
            chunkEventsByStreamId: {},
            chunkStatsByUser: {},
            lastRosterRevision: '',
            rosterTimerId: 0
        };

        const manualOffsetsMs = {};
        const remoteUserStaleMs = 12000;
        const vdoLatencyStaleMs = 8000;
        const vdoLatencyMaxStepMs = 50;

        if (!appState.intervalSource) {
            appState.intervalSource = window.location.origin + '/intervals';
        }

        function normalizeUserId(userId) {
            let value = String(userId || '').trim().toLowerCase();
            value = value.replace(/^anonymous:/, '');
            value = value.replace(/^guest:/, '');
            value = value.replace(/\s+/g, '');
            value = value.replace(/@.*$/, '');
            value = value.replace(/[^a-z0-9._-]/g, '');
            return value;
        }

        function getOffsetStorageKey(userId) {
            return 'ninjamPeerOffset:' + appState.room + ':' + normalizeUserId(userId);
        }

        function getManualOffsetMs(userId) {
            const key = normalizeUserId(userId);
            if (typeof manualOffsetsMs[key] === 'number' && isFinite(manualOffsetsMs[key])) {
                return Math.round(manualOffsetsMs[key]);
            }
            try {
                if (window.localStorage) {
                    const raw = window.localStorage.getItem(getOffsetStorageKey(key));
                    const parsed = parseInt(raw || '', 10);
                    if (isFinite(parsed)) {
                        manualOffsetsMs[key] = parsed;
                        return parsed;
                    }
                }
            } catch (e) {
            }
            manualOffsetsMs[key] = 0;
            return 0;
        }

        function setManualOffsetMs(userId, value) {
            const key = normalizeUserId(userId);
            const nextValue = Math.max(-6000, Math.min(6000, Math.round(value)));
            manualOffsetsMs[key] = nextValue;
            try {
                if (window.localStorage) {
                    window.localStorage.setItem(getOffsetStorageKey(key), String(nextValue));
                }
            } catch (e) {
            }
            return nextValue;
        }

        function copyTextToClipboard(text) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                return navigator.clipboard.writeText(text);
            }
            return new Promise(function (resolve, reject) {
                try {
                    const temp = document.createElement('textarea');
                    temp.value = text;
                    temp.style.position = 'fixed';
                    temp.style.left = '-9999px';
                    document.body.appendChild(temp);
                    temp.focus();
                    temp.select();
                    const ok = document.execCommand('copy');
                    document.body.removeChild(temp);
                    if (ok) resolve();
                    else reject(new Error('copy failed'));
                } catch (err) {
                    reject(err);
                }
            });
        }

        function buildUserSampleKey(data, bufferMs) {
            return [
                String(data.interval ?? ''),
                String(data.syncTag ?? ''),
                String(data.videoClockMs ?? ''),
                String(data.timecode ?? ''),
                String(data.eventId ?? ''),
                String(data.bufferRefreshEventId ?? ''),
                String(data.refreshBuffer ? 1 : 0),
                String(data.voiceChatMode ? 1 : 0),
                String(data.intervalMeasurementSeen ? 1 : 0),
                String(data.bufferCalculated ? 1 : 0),
                String(data.serverRouteLatencyReady ? 1 : 0),
                String(Math.round(Number(data.intervalSignalAgeMs ?? -1) / 1000)),
                String(Math.round(Number(data.serverRouteAgeMs ?? -1) / 1000)),
                (typeof bufferMs === 'number' && isFinite(bufferMs)) ? String(Math.round(bufferMs)) : ''
            ].join('|');
        }

        function getTrackedUserKeys() {
            const keys = {};
            const sets = [
                ninjamSync.remoteBuffers,
                ninjamSync.remoteTimecodes
            ];
            for (let i = 0; i < sets.length; i++) {
                const source = sets[i] || {};
                const sourceKeys = Object.keys(source);
                for (let j = 0; j < sourceKeys.length; j++) {
                    const key = normalizeUserId(sourceKeys[j]);
                    if (key) {
                        keys[key] = true;
                    }
                }
            }
            return Object.keys(keys).sort();
        }

        function resetBufferApplicationState(userKey) {
            const key = normalizeUserId(userKey);
            if (!key) {
                return;
            }
            delete vdoState.lastAppliedBufferByUser[key];
            delete vdoState.lastBufferRefreshIdByUser[key];
            if (vdoState.bufferRefreshTimersByUser[key]) {
                clearTimeout(vdoState.bufferRefreshTimersByUser[key]);
            }
            delete vdoState.bufferRefreshTimersByUser[key];
            delete vdoState.bufferRefreshPendingUntilByUser[key];
        }

        function resolveUserKeyFromLabel(label) {
            const normalizedLabel = normalizeUserId(label);
            if (!normalizedLabel) {
                return '';
            }
            const trackedUsers = getTrackedUserKeys();
            if (trackedUsers.indexOf(normalizedLabel) >= 0) {
                return normalizedLabel;
            }

            let matchedUser = '';
            for (let i = 0; i < trackedUsers.length; i++) {
                const candidate = trackedUsers[i];
                if (normalizedLabel.indexOf(candidate) >= 0 || candidate.indexOf(normalizedLabel) >= 0) {
                    if (matchedUser && matchedUser !== candidate) {
                        return '';
                    }
                    matchedUser = candidate;
                }
            }
            return matchedUser;
        }

        function extractPeerLabel(data) {
            if (!data || typeof data !== 'object') {
                return '';
            }
            if (typeof data.label === 'string' && data.label.trim()) {
                return data.label;
            }
            const value = data.value;
            if (!value || typeof value !== 'object') {
                return '';
            }
            const labelKeys = ['label', 'displayName', 'guestLabel', 'name', 'id'];
            for (let i = 0; i < labelKeys.length; i++) {
                const labelValue = value[labelKeys[i]];
                if (typeof labelValue === 'string' && labelValue.trim()) {
                    return labelValue;
                }
            }
            return '';
        }

        function formatMaybeMs(value) {
            return (typeof value === 'number' && isFinite(value)) ? (Math.round(value) + 'ms') : '?';
        }

        function registerPeerTarget(streamId, label, explicitTargetId) {
            const cleanStreamId = String(streamId || '').trim();
            if (!cleanStreamId) {
                return false;
            }
            if (label) {
                vdoState.labelByStreamId[cleanStreamId] = label;
            }
            const userKey = resolveUserKeyFromLabel(label);
            if (!userKey) {
                return false;
            }
            const targetId = String(explicitTargetId || cleanStreamId).trim();
            const changed = vdoState.streamIdByUser[userKey] !== cleanStreamId
                || vdoState.targetIdByUser[userKey] !== targetId;
            vdoState.streamIdByUser[userKey] = cleanStreamId;
            vdoState.targetIdByUser[userKey] = targetId;
            if (changed) {
                resetBufferApplicationState(userKey);
            }
            return changed;
        }

        function unregisterPeerTarget(streamId) {
            const cleanStreamId = String(streamId || '').trim();
            if (!cleanStreamId) {
                return false;
            }
            delete vdoState.labelByStreamId[cleanStreamId];
            let changed = false;
            const trackedUsers = Object.keys(vdoState.streamIdByUser);
            for (let i = 0; i < trackedUsers.length; i++) {
                const userKey = trackedUsers[i];
                if (vdoState.streamIdByUser[userKey] === cleanStreamId) {
                    delete vdoState.streamIdByUser[userKey];
                    delete vdoState.targetIdByUser[userKey];
                    delete vdoState.chunkStatsByUser[userKey];
                    resetBufferApplicationState(userKey);
                    changed = true;
                }
            }
            delete vdoState.chunkEventsByStreamId[cleanStreamId];
            return changed;
        }

        function getStringProperty(objectValue, keyNames) {
            if (!objectValue || typeof objectValue !== 'object') {
                return '';
            }
            const wanted = {};
            for (let i = 0; i < keyNames.length; i++) {
                wanted[String(keyNames[i]).toLowerCase()] = true;
            }
            const entries = Object.entries(objectValue);
            for (let i = 0; i < entries.length; i++) {
                const entry = entries[i];
                if (!wanted[String(entry[0]).toLowerCase()]) {
                    continue;
                }
                if (typeof entry[1] === 'string' && entry[1].trim()) {
                    return entry[1].trim();
                }
            }
            return '';
        }

        function getNumericProperty(objectValue, keyNames) {
            if (!objectValue || typeof objectValue !== 'object') {
                return NaN;
            }
            const wanted = {};
            for (let i = 0; i < keyNames.length; i++) {
                wanted[String(keyNames[i]).toLowerCase()] = true;
            }
            const entries = Object.entries(objectValue);
            for (let i = 0; i < entries.length; i++) {
                const entry = entries[i];
                if (!wanted[String(entry[0]).toLowerCase()]) {
                    continue;
                }
                if (typeof entry[1] === 'number' && isFinite(entry[1])) {
                    return entry[1];
                }
            }
            return NaN;
        }

        function clampLatencyMs(value) {
            if (typeof value !== 'number' || !isFinite(value) || value < 0) {
                return NaN;
            }
            return Math.max(0, Math.min(1200, value));
        }

        function getAverageCounterMs(objectValue, totalKeys, countKeys, maxMs) {
            const totalSeconds = getNumericProperty(objectValue, totalKeys);
            let count = NaN;
            if (objectValue && typeof objectValue === 'object') {
                const entries = Object.entries(objectValue);
                for (let i = 0; i < countKeys.length; i++) {
                    const wanted = String(countKeys[i]).toLowerCase();
                    for (let j = 0; j < entries.length; j++) {
                        if (String(entries[j][0]).toLowerCase() !== wanted) {
                            continue;
                        }
                        if (typeof entries[j][1] === 'number' && isFinite(entries[j][1]) && entries[j][1] > 0) {
                            count = entries[j][1];
                            break;
                        }
                    }
                    if (isFinite(count) && count > 0) {
                        break;
                    }
                }
            }
            if (!isFinite(totalSeconds) || !isFinite(count) || totalSeconds <= 0 || count <= 0) {
                return NaN;
            }
            const ms = (totalSeconds / count) * 1000.0;
            return Math.max(0, Math.min(maxMs, ms));
        }

        function getMessageNumber(data, keyNames) {
            if (!data || typeof data !== 'object') {
                return NaN;
            }
            for (let i = 0; i < keyNames.length; i++) {
                const value = data[keyNames[i]];
                if (typeof value === 'number' && isFinite(value)) {
                    return value;
                }
            }
            return NaN;
        }

        function getNonNegativeMessageMs(data, keyNames) {
            const value = getMessageNumber(data, keyNames);
            return (isFinite(value) && value >= 0) ? value : NaN;
        }

        function boolProp(data, key) {
            return data && Object.prototype.hasOwnProperty.call(data, key) ? data[key] === true : null;
        }

        function buildSyncDiagnostics(data, bufferMs) {
            const serverRouteLatencyMs = getNonNegativeMessageMs(data, ['serverRouteLatencyMs']);
            const intervalSignalAgeMs = getNonNegativeMessageMs(data, ['intervalSignalAgeMs']);
            const serverRouteAgeMs = getNonNegativeMessageMs(data, ['serverRouteAgeMs']);
            const hasBuffer = (typeof bufferMs === 'number' && isFinite(bufferMs) && bufferMs >= 0)
                || boolProp(data, 'bufferCalculated') === true;
            const hasInterval = boolProp(data, 'intervalMeasurementSeen') === true
                || isFinite(getMessageNumber(data, ['lastIntervalMeasurementMs', 'averageIntervalMeasurementMs', 'firmIntervalMeasurementMs']))
                || hasBuffer;
            const explicitServerRoute = boolProp(data, 'serverRouteLatencyReady');
            const hasServerRoute = explicitServerRoute !== null ? explicitServerRoute : isFinite(serverRouteLatencyMs);
            const parts = [];
            if (!hasInterval) {
                parts.push(isFinite(intervalSignalAgeMs) ? 'waiting local marker' : 'interval missing');
            } else if (!hasBuffer) {
                parts.push('buffer pending');
            } else {
                parts.push('sync ok');
            }
            if (hasServerRoute) {
                parts.push('route ok');
            } else {
                parts.push(isFinite(serverRouteAgeMs) ? 'route aging' : 'route pending');
            }
            return {
                ok: hasInterval && hasBuffer,
                text: parts.join(' | ')
            };
        }

        function resolveIncomingBufferMs(data) {
            const measuredAudioDelayMs = getNonNegativeMessageMs(data, ['measuredAudioDelayMs', 'audioDelayMs']);
            const senderServerLatencyMs = getNonNegativeMessageMs(data, ['senderServerLatencyMs', 'remoteServerLatencyMs']);
            const receiverServerLatencyMs = getNonNegativeMessageMs(data, ['receiverServerLatencyMs', 'localServerLatencyMs']);
            if (isFinite(measuredAudioDelayMs) && (isFinite(senderServerLatencyMs) || isFinite(receiverServerLatencyMs))) {
                const sender = isFinite(senderServerLatencyMs) ? senderServerLatencyMs : 0;
                const receiver = isFinite(receiverServerLatencyMs) ? receiverServerLatencyMs : 0;
                return Math.max(minimumBufferMs, Math.round(measuredAudioDelayMs - sender - receiver));
            }

            const receiverBufferMs = getNonNegativeMessageMs(data, ['receiverBufferMs']);
            if (isFinite(receiverBufferMs)) {
                return Math.max(minimumBufferMs, Math.round(receiverBufferMs));
            }

            const bufferTotalMs = getNonNegativeMessageMs(data, ['bufferTotalMs']);
            if (isFinite(bufferTotalMs)) {
                return Math.max(minimumBufferMs, Math.round(bufferTotalMs));
            }

            if (isFinite(measuredAudioDelayMs)) {
                return Math.max(minimumBufferMs, Math.round(measuredAudioDelayMs));
            }

            return NaN;
        }

        function getIncomingVdoLatencyMs(data) {
            const latencyMs = getNonNegativeMessageMs(data, [
                'cameraSendLatencyMs', 'vdoCameraLatencyMs', 'vdoSendLatencyMs',
                'cameraLatencyMs', 'videoSendLatencyMs', 'senderVideoLatencyMs',
                'sendLatencyMs', 'senderLatencyMs', 'captureLatencyMs', 'captureDelayMs',
                'encodeLatencyMs', 'encoderLatencyMs', 'encodeDelayMs', 'encoderDelayMs',
                'decodeLatencyMs', 'decoderLatencyMs', 'decodeDelayMs', 'decoderDelayMs',
                'jitterBufferDelayMs', 'playoutDelayMs', 'renderDelayMs', 'videoPipelineLatencyMs'
            ]);
            return isFinite(latencyMs) ? clampLatencyMs(latencyMs) : NaN;
        }

        function resolveUserKeyFromPeerIds(streamId, targetId, label) {
            const cleanTargetId = String(targetId || '').trim();
            if (cleanTargetId) {
                const users = Object.keys(vdoState.targetIdByUser || {});
                for (let i = 0; i < users.length; i++) {
                    const userKey = users[i];
                    if (String(vdoState.targetIdByUser[userKey] || '').trim() === cleanTargetId) {
                        return userKey;
                    }
                }
            }

            const cleanStreamId = String(streamId || '').trim();
            if (cleanStreamId) {

                    }
                }
                connectWs();
                return;
            }

            function tick() {
                fetch(appState.intervalSource, { cache: 'no-store' })
                    .then(function (response) {
                        return response.json();
                    })
                    .then(function (payload) {
                        processIntervalPayload(payload);
                    })
                    .catch(function () {
                    })
                    .finally(function () {
                        setTimeout(tick, appState.intervalPollMs);
                    });
            }
            tick();
        }

        function applyVdoCodecParams(params) {
            if (appState.cameraCodec !== 'default') {
                params.set('codec', appState.cameraCodec);
            }
        }

        function vdoQualityPresetConfig(preset) {
            const quality = normalizeVdoQualityPreset(preset);
            if (quality === '1080p60') return { quality: '0', width: 1920, height: 1080, fps: 60, bitrate: 6000 };
            if (quality === '1080p30') return { quality: '0', width: 1920, height: 1080, fps: 30, bitrate: 4500 };
            if (quality === '720p60') return { quality: '1', width: 1280, height: 720, fps: 60, bitrate: 3500 };
            if (quality === '720p30') return { quality: '1', width: 1280, height: 720, fps: 30, bitrate: 2500 };
            if (quality === '360p30') return { quality: '2', width: 640, height: 360, fps: 30, bitrate: 1200 };
            return null;
        }

        function applyVdoQualityParams(params) {
            const config = vdoQualityPresetConfig(appState.cameraQuality);
            if (!config) {
                return;
            }
            params.set('quality', config.quality);
            params.set('fps', String(config.fps));
            params.set('bitrate', String(config.bitrate));
        }

        function applyCameraFxParams(params) {
            if (appState.cameraFx === 'blur') {
                params.set('effects', '3');
                params.set('effectvalue', String(appState.cameraFxStrength));
            } else if (appState.cameraFx === 'remove') {
                params.set('effects', '16');
            } else if (appState.cameraFx === 'green') {
                params.set('effects', '4');
            } else if (appState.cameraFx === 'image') {
                params.set('effects', '5');
                if (appState.cameraBgImage) {
                    params.set('imagelist', encodeURIComponent(JSON.stringify([appState.cameraBgImage])));
                }
            }
        }

        function postEvalToVdo(source) {
            return postToVdo({ function: 'eval', value: source });
        }

        function vdoEffectIdForFx(fx) {
            const value = normalizeCameraFx(fx);
            if (value === 'blur') return '3';
            if (value === 'remove') return '16';
            if (value === 'green') return '4';
            if (value === 'image') return '5';
            return '0';
        }

        function applyLiveVdoQuality() {
            const config = vdoQualityPresetConfig(appState.cameraQuality);
            if (!config) {
                return false;
            }
            const script = '(function(){' +
                'var cfg=' + JSON.stringify(config) + ';' +
                'try{' +
                'session.quality=' + JSON.stringify(config.quality) + ';' +
                'session.frameRate=cfg.fps;' +
                'session.maxframeRate=cfg.fps;' +
                'session.bitrate=cfg.bitrate;' +
                'var stream=session.streamSrc||null;' +
                'var track=stream&&stream.getVideoTracks?stream.getVideoTracks()[0]:null;' +
                'if(track&&track.readyState==="live"&&track.applyConstraints){' +
                'track.applyConstraints({width:{ideal:cfg.width},height:{ideal:cfg.height},frameRate:{ideal:cfg.fps,max:cfg.fps}})' +
                '.then(function(){try{session.currentCameraConstraints=track.getSettings();}catch(e){}})' +
                '.catch(function(e){try{errorlog(e&&e.message?e.message:e);}catch(_){}});' +
                '}' +
                '}catch(e){try{errorlog(e&&e.message?e.message:e);}catch(_){}}' +
                '})();';
            return postEvalToVdo(script);
        }

        function applyLiveVdoEffects() {
            const effectId = vdoEffectIdForFx(appState.cameraFx);
            const payload = {
                effect: effectId,
                effectValue: normalizeCameraFxStrength(appState.cameraFxStrength),
                image: String(appState.cameraBgImage || '').trim()
            };
            const script = '(function(){' +
                'var cfg=' + JSON.stringify(payload) + ';' +
                'try{' +
                'var effect=String(cfg.effect||"0");' +
                'var amount=parseInt(cfg.effectValue||4,10)||4;' +
                'if(effect==="5"&&cfg.image){' +
                'session.defaultBackgroundImages=[cfg.image];' +
                'session.effectsImage=document.createElement("img");' +
                'session.effectsImage.crossOrigin="Anonymous";' +
                'session.effectsImage.src=cfg.image;' +
                '}' +
                'if(effect==="3"){session.effectValue_default=amount;session.effectValue=amount;}else{session.effectValue_default=false;}' +
                'var select=document.getElementById("effectSelector3")||document.getElementById("effectSelector");' +
                'if(select){' +
                'var found=false;' +
                'for(var i=0;i<select.options.length;i++){if(String(select.options[i].value)===effect){found=true;break;}}' +
                'if(found){select.value=effect;effectsDynamicallyUpdate(null,select);}else{session.effect=effect==="0"?false:effect;updateRenderOutpipe();}' +
                '}else{session.effect=effect==="0"?false:effect;updateRenderOutpipe();}' +
                'if(effect==="3"){session.effectValue=amount;session.effectValue_default=amount;["selectEffectAmountInput","selectEffectAmountInput3"].forEach(function(id){var input=document.getElementById(id);if(input)input.value=amount;});updateRenderOutpipe();}' +
                '}catch(e){try{errorlog(e&&e.message?e.message:e);}catch(_){}}' +
                '})();';
            return postEvalToVdo(script);
        }

        function applyLiveCameraSettings(settings, changed) {
            if (!settings || typeof settings !== 'object') {
                return;
            }
            appState.cameraCodec = normalizeVdoCodec(settings.cameraCodec || appState.cameraCodec);
            appState.cameraQuality = normalizeVdoQualityPreset(settings.cameraQuality || appState.cameraQuality);
            appState.cameraFx = normalizeCameraFx(settings.cameraFx || appState.cameraFx);
            appState.cameraFxStrength = normalizeCameraFxStrength(settings.cameraFxStrength || appState.cameraFxStrength);
            appState.cameraBgImage = String(settings.cameraBgImage || '');
            if (!changed || changed === 'quality') {
                applyLiveVdoQuality();
            }
            if (!changed || changed === 'fx') {
                applyLiveVdoEffects();
            }
        }

        function buildIframeUrl() {
            const iframeParams = new URLSearchParams();
            iframeParams.set('room', appState.room);
            iframeParams.set('label', appState.label);
            iframeParams.set('chunked', String(Math.max(60, appState.chunkedMs || 120)));
            iframeParams.set('chunkbufferadaptive', '0');
            iframeParams.set('chunkbufferceil', '180000');
            iframeParams.set('noaudio', '1');
            iframeParams.set('buffer2', '0');
            // Keep the initial room join buffer minimal; the sync layer applies the
            // measured delay after load, and sending both can double the result.
            iframeParams.set('buffer', String(minimumBufferMs));
            applyVdoCodecParams(iframeParams);
            applyVdoQualityParams(iframeParams);
            applyCameraFxParams(iframeParams);
            return 'https://vdo.ninja/?' + iframeParams.toString();
        }

        function handleVdoMessage(data) {
            if (!data || typeof data !== 'object') {
                return;
            }

            let changed = false;
            changed = handleVdoChunkEvent(data) || changed;
            changed = updateVdoChunkStats(data) || changed;

            if (data.streamIDs && typeof data.streamIDs === 'object') {
                const entries = Object.entries(data.streamIDs);
                for (let i = 0; i < entries.length; i++) {
                    const entry = entries[i];
                    changed = registerPeerTarget(entry[0], entry[1], entry[0]) || changed;
                }
            }

            if (data.action === 'guest-connected' && data.streamID) {
                changed = registerPeerTarget(data.streamID, extractPeerLabel(data), data.UUID || data.streamID) || changed;
            } else if (data.action === 'push-connection' && data.streamID) {
                if (data.value === false) {
                    changed = unregisterPeerTarget(data.streamID) || changed;
                } else {
                    changed = registerPeerTarget(data.streamID, extractPeerLabel(data), data.UUID || data.streamID) || changed;
                }
            }

            const detailedLatencyByUser = collectDetailedStateLatencyByUser(data);
            const detailedUsers = Object.keys(detailedLatencyByUser);
            let latencyChanged = false;
            for (let i = 0; i < detailedUsers.length; i++) {
                const userKey = detailedUsers[i];
                latencyChanged = setEstimatedVdoLatencyMs(userKey, detailedLatencyByUser[userKey]) || latencyChanged;
            }

            if (changed || latencyChanged) {
                applyPeerBuffers(true);
            } else {
                updateSyncStatus();
            }
        }

        window.addEventListener('message', function (event) {
            if (vdoFrame && event.source === vdoFrame.contentWindow) {
                handleVdoMessage(event.data);
                return;
            }
            if (event.origin !== window.location.origin) {
                return;
            }
            if (event.data && typeof event.data === 'object' && event.data.type === 'ninjam-vdo-camera-settings') {
                applyLiveCameraSettings(event.data.settings || {}, event.data.changed || '');
                return;
            }
            if (!event.data || typeof event.data !== 'object' || event.data.type !== 'ninjamOffsetUpdate') {
                return;
            }
            const userKey = normalizeUserId(event.data.userId || '');
            if (!userKey) {
                return;
            }
            const offsetMs = parseInt(event.data.offsetMs, 10);
            if (!isFinite(offsetMs)) {
                return;
            }
            setManualOffsetMs(userKey, offsetMs);
            applyPeerBuffers(true);
        });

        if (vdoFrame) {
            vdoFrame.addEventListener('load', function () {
                vdoState.iframeLoaded = true;
                requestVdoRoster();
                applyPeerBuffers(true);
                if (vdoState.rosterTimerId) {
                    clearInterval(vdoState.rosterTimerId);
                }
                vdoState.rosterTimerId = setInterval(requestVdoRoster, 2500);
            });
            vdoFrame.src = buildIframeUrl();
        }

        if (appState.bg.toLowerCase() === 'green') {
            document.body.classList.add('green-mode');
        }

        roomValue.textContent = 'Room: ' + appState.room;
        labelValue.textContent = 'Label: ' + appState.label;
        updateSyncStatus();
        startIntervalSource();
        setInterval(pruneInactiveUsers, 1500);
    </script>
</body>
